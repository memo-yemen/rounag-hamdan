<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج - رونق همدان للأثاث</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-detail-container {
            display: flex;
            padding: 50px 5%;
            gap: 40px;
            background: var(--white);
        }

        .product-gallery {
            flex: 1;
        }

        .main-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
        }

        .thumbnail-list {
            display: flex;
            gap: 10px;
        }

        .thumbnail {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 5px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
        }

        .thumbnail.active,
        .thumbnail:hover {
            border-color: var(--primary-color);
        }

        .product-info-detail {
            flex: 1;
        }

        .product-title-detail {
            font-size: 2rem;
            color: var(--dark-gray);
            margin-bottom: 10px;
        }

        .product-rating-detail {
            color: #FFD700;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .product-price-detail {
            font-size: 2rem;
            color: var(--primary-color);
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .product-old-price-detail {
            text-decoration: line-through;
            color: #999;
            font-size: 1.3rem;
            font-weight: normal;
        }

        .product-desc-detail {
            color: #555;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .add-to-cart-group {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 30px;
        }

        .quantity-input {
            width: 70px;
            height: 50px;
            text-align: center;
            font-size: 1.2rem;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .btn-add-cart-large {
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            height: 50px;
            padding: 0 40px;
            font-size: 1.2rem;
            border-radius: 5px;
            cursor: pointer;
            transition: var(--transition);
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-add-cart-large:hover {
            background-color: #660000;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .product-detail-container {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">

        </a>

            <input type="text" id="searchInput" placeholder="ابحث عن منتج...">
            <button class="nav-icons" style="background:none; border:none"><i class="fas fa-search"></i></button>
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="shop.html">المتجر</a></li>
            <li><a href="about.html">من نحن</a></li>
            <li><a href="contact.html">اتصل بنا</a></li>
        </ul>
        <div class="nav-icons">
            <a href="login.html"><i class="far fa-user"></i></a>
            <a href="wishlist.html"><i class="far fa-heart"></i></a>
            <a href="cart.html" style="position: relative;">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </a>
            <button class="mobile-menu-btn" onclick="toggleMenu()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- Product Detail Section -->

        <!-- Content injected via JS -->

        </div>

    <script src="js/product.js"></script>
</body>
