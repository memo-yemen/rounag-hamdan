<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - رونق همدان للأثاث</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            background: var(--gray-color);
            padding: 40px 20px;
        }

        .auth-box {
            background: var(--white);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .auth-box h2 {
            margin-bottom: 30px;
            color: var(--primary-color);
            font-size: 2rem;
        }

        .auth-form .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .auth-form .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark-gray);
            font-weight: 500;
        }

        .auth-form .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
        }

        .btn-auth {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .auth-links {
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .auth-links a {
            color: var(--primary-color);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <img src="img/logo.jpg" alt="شعار" class="logo-img"> رونق <span>همدان</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="shop.html">المتجر</a></li>
        </ul>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h2>إنشاء حساب جديد</h2>
            <form class="auth-form" id="registerForm">
                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="regName" class="form-control" required placeholder="أدخل اسمك الكامل">
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="regEmail" class="form-control" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="regPassword" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-auth">إنشاء حساب</button>
            </form>
            <div class="auth-links">
                <p>لديك حساب بالفعل؟ <a href="login.html">سجل دخولك هنا</a></p>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            // Simple registration logic using localStorage via DB if needed, or direct
            const users = JSON.parse(localStorage.getItem('rawnaq_users') || '[]');
            
            if (users.find(u => u.email === email)) {
                alert('هذا البريد الإلكتروني مسجل مسبقاً!');
                return;
            }

            users.push({ name, email, password });
            localStorage.setItem('rawnaq_users', JSON.stringify(users));

            alert('تم إنشاء الحساب بنجاح! يمكنك الآن تسجيل الدخول.');
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
