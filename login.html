<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - رونق همدان للأثاث</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            background: var(--gray-color);
            padding: 40px 20px;
        }

        .auth-box {
            background: var(--white);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-box h2 {
            margin-bottom: 30px;
            color: var(--primary-color);
            font-size: 2rem;
        }

        .auth-form .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .auth-form .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark-gray);
            font-weight: 500;
        }

        .auth-form .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            transition: var(--transition);
        }

        .auth-form .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn-auth {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .btn-auth:hover {
            background: #660000;
        }

        .auth-links {
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .auth-links a {
            color: var(--primary-color);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <img src="img/logo.jpg" alt="شعار" class="logo-img"> رونق <span>همدان</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="shop.html">المتجر</a></li>
        </ul>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h2>تسجيل الدخول</h2>
            <form class="auth-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" class="form-control" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-auth">دخول</button>
            </form>
            <div class="auth-links">
                <p>ليس لديك حساب؟ <a href="register.html">سجل الآن</a></p>
                <p style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                    هل أنت مدير النظام؟ <br>
                    <a href="admin.html"
                        style="display: inline-block; margin-top: 10px; padding: 5px 15px; background: var(--dark-gray); color: white; border-radius: 5px;">دخول
                        لوحة التحكم</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const users = JSON.parse(localStorage.getItem('rawnaq_users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);

            if (user) {
                alert('تم تسجيل الدخول بنجاح! أهلاً بك يا ' + user.name);
                localStorage.setItem('rawnaq_logged_user', JSON.stringify(user));
                window.location.href = 'index.html';
            } else {
                alert('البريد الإلكتروني أو كلمة المرور غير صحيحة!');
            }
        }
    </script>
</body>

</html>
