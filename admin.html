<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - رونق همدان للأثاث</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 250px;
            background: var(--dark-gray);
            color: var(--white);
            padding: 20px 0;
            flex-shrink: 0;
        }

        .admin-brand {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 30px;
            color: var(--secondary-color);
        }

        .admin-nav {
            list-style: none;
        }

        .admin-nav li a {
            display: block;
            padding: 15px 20px;
            color: #ccc;
            border-right: 4px solid transparent;
            transition: var(--transition);
        }

        .admin-nav li a:hover,
        .admin-nav li a.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            border-right-color: var(--primary-color);
        }

        .admin-nav li a i {
            width: 25px;
        }

        .admin-content {
            flex-grow: 1;
            background: var(--gray-color);
            padding: 30px;
        }

        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(139, 0, 0, 0.1);
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .stat-info h3 {
            font-size: 2rem;
            color: var(--dark-gray);
        }

        .stat-info p {
            color: #666;
            margin: 0;
        }

        .admin-panel {
            background: var(--white);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: none;
        }

        .admin-panel.active {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px 15px;
            text-align: right;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: var(--gray-color);
            color: var(--dark-gray);
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            margin-left: 10px;
        }

        .edit-btn {
            color: #3498db;
        }

        .del-btn {
            color: #e74c3c;
        }

        /* Forms */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--dark-gray);
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: inherit;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .status-new {
            background: #ffeaa7;
            color: #d35400;
        }

        .status-processing {
            background: #74b9ff;
            color: #0984e3;
        }

        .status-delivered {
            background: #55efc4;
            color: #00b894;
        }

        .status-canceled {
            background: #fab1a0;
            color: #d63031;
        }
    </style>
</head>

<body>
    <script>
        // Simple Admin Protection
        const adminPass = "614885mem"; // يمكنكِ تغيير كلمة المرور من هنا
        const enteredPass = prompt("الرجاء إدخال كلمة مرور المدير للدخول إلى لوحة التحكم:");

        if (enteredPass !== adminPass) {
            alert("كلمة مرور خاطئة! سيتم توجيهك للصفحة الرئيسية.");
            window.location.href = "index.html";
        }
    </script>

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-brand">
                <img src="img/logo.jpg" alt="شعار" class="logo-img"> رونق <span>همدان</span><br>
                <span style="font-size: 1rem; color: #ccc;">لوحة الإدارة</span>
            </div>
            <ul class="admin-nav">
                <li><a href="#" class="nav-link active" data-target="dashboard"><i class="fas fa-chart-line"></i> لوحة
                        القيادة</a></li>
                <li><a href="#" class="nav-link" data-target="products"><i class="fas fa-box-open"></i> إدارة
                        المنتجات</a></li>
                <li><a href="#" class="nav-link" data-target="orders"><i class="fas fa-shopping-bag"></i> الطلبات</a>
                </li>
                <li><a href="index.html" style="margin-top: 50px; color: var(--primary-color);"><i
                            class="fas fa-sign-out-alt"></i> العودة للموقع</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <!-- Dashboard Panel -->
            <div id="dashboard" class="admin-panel active">
                <h2 style="margin-bottom: 20px;">نظرة عامة</h2>
                <div class="dashboard-cards">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-shopping-bag"></i></div>
                        <div class="stat-info">
                            <h3 id="statTotalOrders">0</h3>
                            <p>إجمالي الطلبات</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-box-open"></i></div>
                        <div class="stat-info">
                            <h3 id="statTotalProducts">0</h3>
                            <p>عدد المنتجات</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Products Panel -->
            <div id="products" class="admin-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>إدارة المنتجات</h2>
                    <button class="btn-primary" onclick="showProductForm()"><i class="fas fa-plus"></i> إضافة
                        منتج</button>
                </div>

                <div id="productFormContainer"
                    style="display: none; background: var(--gray-color); padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                    <h3 id="formTitle" style="margin-bottom: 15px;">إضافة منتج جديد</h3>
                    <input type="hidden" id="prodId">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>اسم المنتج</label>
                            <input type="text" id="prodName" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>القسم</label>
                            <select id="prodCategory" class="form-control" required>
                                <!-- Categories injected via JS -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label>السعر الأساسي (ريال يمني)</label>
                            <input type="number" id="prodPrice" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>نسبة الخصم (%)</label>
                            <input type="number" id="prodDiscount" class="form-control" value="0">
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>روابط الصور (يمكنك إضافة عدة روابط، كل رابط في سطر منفصل)</label>
                            <textarea id="prodImages" class="form-control" rows="3"
                                placeholder="img/a.jpg&#10;img/b.jpg&#10;img/c.jpg" required></textarea>
                        </div>
                        <div class="form-group" style="grid-column: 1 / -1;">
                            <label>وصف المنتج</label>
                            <textarea id="prodDesc" class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="prodFeatured"> مميز (يظهر في الرئيسية)
                            </label>
                        </div>
                    </div>
                    <div style="margin-top: 20px;">
                        <button class="btn-primary" onclick="saveProduct()">حفظ المنتج</button>
                        <button class="btn-secondary" onclick="hideProductForm()">إلغاء</button>
                    </div>
                </div>

                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>صورة</th>
                                <th>الاسم</th>
                                <th>القسم</th>
                                <th>السعر</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="adminProductsList">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Orders Panel -->
            <div id="orders" class="admin-panel">
                <h2 style="margin-bottom: 20px;">الطلبات الواردة</h2>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>رقم الطلب</th>
                                <th>العميل</th>
                                <th>التاريخ</th>
                                <th>الإجمالي</th>
                                <th>الحالة</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="adminOrdersList">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script src="js/db.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
